services:
  # 1. PYTHON UYGULAMAMIZ
  app:
    build: .
    container_name: nexstream_engine
    depends_on:
      db:
        condition: service_healthy  # ✅ DB gerçekten hazır olsun
      kafka:
        condition: service_healthy  # ✅ Kafka gerçekten hazır olsun  
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:8000"
      
    volumes:
      - .:/app

  # 2. VERİTABANI (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: nexstream_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:  # ✅ Gerçekten hazır mı diye kontrol et
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 3. YÖNETİM PANELİ (Adminer)
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # 4. KAFKA KOORDİNATÖRÜ (Zookeeper)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: nexstream_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Whitelist satırını silebilirsin, işe yaramıyor zaten :)
    ports:
      - "2181:2181"
    healthcheck:  # ✅ İŞTE SİHİRLİ DOKUNUŞ BURADA
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # 5. MESAJ KUYRUĞU (Kafka)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: nexstream_kafka
    depends_on:
      zookeeper:
        condition: service_healthy  # ✅ Zookeeper hazır olmadan başlama
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:  # ✅ Eklendi
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s  # Kafka'nın ayağa kalkması için süre tanı

  # 6. ARKA PLAN İŞÇİSİ (Consumer)
  worker:
    build: .
    container_name: nexstream_worker
    depends_on:
      kafka:
        condition: service_healthy  # ✅ Kafka hazır olmadan başlama
      db:
        condition: service_healthy  # ✅ DB hazır olmadan başlama
    command: python -m src.adapters.messaging.kafka_consumer
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092  # ✅ EKSİKTİ, eklendi
    volumes:
      - .:/app

  # 7. ZAMANLAYICI (Scheduler)
  scheduler:
    build: .
    container_name: nexstream_scheduler
    depends_on:
      kafka:
        condition: service_healthy  # ✅ Kafka hazır olmadan başlama
    command: python src/adapters/scheduling/scheduler_service.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SCRAPE_SOURCES=BBC Technology  # ✅ Kaynak listesi env'den geliyor
    volumes:
      - .:/app

    # 8. GÖSTERGE PANELİ (Streamlit Dashboard)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://app:8000
    depends_on:
      - app
    volumes:
      - .:/app       

volumes:
  postgres_data: